<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#43317e"/>
    <stop offset=".38" stop-color="#ee699d"/>
    <stop offset=".75" stop-color="#ffc97b"/>
    <stop offset="1" stop-color="#fff0ca"/>
  </linearGradient>
  <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#6e7290"/>
    <stop offset="1" stop-color="#3d4d62"/>
  </linearGradient>
  <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ea"/>
    <stop offset="1" stop-color="#e7cdb4"/>
  </linearGradient>
  <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#56344b"/>
    <stop offset="1" stop-color="#2a2032"/>
  </linearGradient>
  <linearGradient id="deck" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#b77345"/>
    <stop offset="1" stop-color="#6f3e32"/>
  </linearGradient>
  <linearGradient id="pool" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#71f1f2"/>
    <stop offset=".45" stop-color="#18b9d1"/>
    <stop offset="1" stop-color="#087fba"/>
  </linearGradient>
  <radialGradient id="sunGlow">
    <stop offset="0" stop-color="#fff7cb" stop-opacity=".9"/>
    <stop offset=".5" stop-color="#ffca74" stop-opacity=".26"/>
    <stop offset="1" stop-color="#ffca74" stop-opacity="0"/>
  </radialGradient>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#17101f" flood-opacity=".38"/>
  </filter>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>
</defs>

<!-- unified sky -->
<rect width="1280" height="720" fill="url(#sky)"/>
<circle cx="1060" cy="130" r="180" fill="url(#sunGlow)"/>

<!-- subtle clouds -->
<g fill="#fff" opacity=".55">
  <ellipse cx="210" cy="128" rx="86" ry="25"/><ellipse cx="270" cy="117" rx="57" ry="30"/>
  <ellipse cx="900" cy="190" rx="76" ry="22"/><ellipse cx="950" cy="179" rx="50" ry="27"/>
</g>

<!-- distant San Diego hills -->
<path d="M0 435L150 280 275 410 420 245 585 430 760 300 920 434 1080 265 1280 430V530H0Z" fill="url(#mountain)" opacity=".62"/>
<path d="M0 468L205 350 340 460 525 330 705 470 930 350 1100 465 1280 365V540H0Z" fill="#537466" opacity=".72"/>

<!-- lawn base -->
<path d="M0 505 Q280 472 555 505 T1280 492 V720 H0Z" fill="#4a835e"/>
<path d="M0 565 Q300 525 600 560 T1280 548 V720 H0Z" fill="#326449" opacity=".78"/>

<!-- house, built as one scene -->
<g filter="url(#shadow)">
  <path d="M130 360 L445 155 L770 360 Z" fill="url(#roof)"/>
  <path d="M174 348 H731 V600 H174 Z" fill="url(#wall)"/>
  <path d="M174 348 H731" stroke="#fff8ec" stroke-width="10" opacity=".45"/>
  <rect x="245" y="404" width="142" height="196" rx="5" fill="#5c3840"/>
  <rect x="263" y="425" width="106" height="154" rx="3" fill="#3d2933"/>
  <circle cx="350" cy="505" r="6" fill="#f6cc68"/>
  <rect x="458" y="403" width="204" height="112" rx="7" fill="#23485a"/>
  <rect x="472" y="417" width="176" height="84" rx="3" fill="#63c9da"/>
  <path d="M472 455 H648" stroke="#fff" stroke-width="3" opacity=".25"/>
  <path d="M560 417 V501" stroke="#fff" stroke-width="3" opacity=".25"/>
  <rect x="426" y="532" width="265" height="18" rx="9" fill="#c08b65"/>
  <rect x="405" y="550" width="305" height="50" fill="#d5aa81"/>
  <rect x="190" y="378" width="28" height="222" fill="#d7b99d"/>
  <rect x="692" y="378" width="28" height="222" fill="#d7b99d"/>
</g>

<!-- deck in perspective, integrated -->
<path d="M0 590 H900 L1010 720 H0Z" fill="url(#deck)"/>
<g stroke="#d99a60" stroke-width="5" opacity=".55">
  <path d="M90 590L160 720"/><path d="M205 590L280 720"/><path d="M320 590L400 720"/>
  <path d="M435 590L520 720"/><path d="M550 590L640 720"/><path d="M665 590L760 720"/>
  <path d="M780 590L880 720"/>
</g>
<path d="M0 590 H900" stroke="#f0c58e" stroke-width="8" opacity=".55"/>

<!-- landscaped bed -->
<path d="M695 560 Q825 515 970 560 L930 660 H685Z" fill="#2b553d"/>
<g>
  <g transform="translate(760 550)">
    <path d="M0 100 Q-8 40 0-18" stroke="#4f7046" stroke-width="12"/>
    <g fill="#2a744f">
      <ellipse rx="17" ry="65" transform="rotate(-67) translate(0 -55)"/>
      <ellipse rx="17" ry="65" transform="rotate(-35) translate(0 -55)"/>
      <ellipse rx="17" ry="65" transform="rotate(4) translate(0 -55)"/>
      <ellipse rx="17" ry="65" transform="rotate(40) translate(0 -55)"/>
      <ellipse rx="17" ry="65" transform="rotate(70) translate(0 -55)"/>
    </g>
  </g>
  <g fill="#fff3dd">
    <circle cx="830" cy="548" r="17"/><circle cx="862" cy="530" r="16"/>
    <circle cx="892" cy="555" r="18"/><circle cx="922" cy="534" r="15"/>
    <circle cx="950" cy="563" r="17"/>
  </g>
  <g fill="#ffd443">
    <circle cx="830" cy="548" r="5"/><circle cx="862" cy="530" r="5"/>
    <circle cx="892" cy="555" r="5"/><circle cx="922" cy="534" r="5"/>
    <circle cx="950" cy="563" r="5"/>
  </g>
</g>

<!-- pool, one intentional focal area -->
<g filter="url(#shadow)">
  <path d="M910 475 H1278 V720 H955 Q900 690 900 620 V530 Q900 495 910 475Z" fill="#eef8f5"/>
  <path d="M933 500 H1280 V696 H970 Q927 680 927 626 V535 Q927 511 933 500Z" fill="url(#pool)"/>
  <path d="M942 525 Q1010 505 1080 525 T1225 525 T1320 525" fill="none" stroke="#cfffff" stroke-width="8" opacity=".85"/>
  <path d="M950 610 Q1025 585 1090 610 T1225 610 T1315 610" fill="none" stroke="#8debf0" stroke-width="6" opacity=".65"/>
  <ellipse cx="1135" cy="585" rx="54" ry="20" fill="none" stroke="#f6f6ff" stroke-width="7" opacity=".85"/>
</g>

<!-- patio details -->
<g filter="url(#shadow)">
  <rect x="742" y="470" width="112" height="58" rx="8" fill="#5e3944"/>
  <rect x="757" y="485" width="82" height="14" rx="7" fill="#f06779"/>
  <rect x="755" y="515" width="8" height="72" fill="#3a2d35"/>
  <rect x="832" y="515" width="8" height="72" fill="#3a2d35"/>
</g>

<!-- restrained foreground framing -->
<g opacity=".95">
  <path d="M70 720 Q60 610 102 520 Q115 608 112 720Z" fill="#173f34"/>
  <path d="M105 720 Q112 610 160 545 Q153 635 153 720Z" fill="#245e46"/>
  <path d="M1230 720 Q1205 640 1245 570 Q1263 640 1265 720Z" fill="#173f34"/>
</g>

<!-- cinematic warm light -->
<path d="M830 0 L1180 0 L850 720 L570 720Z" fill="#fff4cb" opacity=".055"/>
</svg>